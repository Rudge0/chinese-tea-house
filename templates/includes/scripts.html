  <script>
      ['state1', 'state2', 'state3'].forEach(id => {
          const el = document.getElementById(id);
          if (el) {
              const countUp = new CountUp(id, el.getAttribute('countTo'));
              if (!countUp.error) countUp.start();
              else console.error(countUp.error);
          }
      });
  </script>
