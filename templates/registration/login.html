{% extends "base.html" %}

{% load crispy_forms_tags %}
{% block content %}
  <h1>Login</h1>
  {% if form.errors %}
    <p class="errornote" style="color: red">Invalid username or password</p>
  {% endif %}
  <form action="{% url 'login' %}" method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <br>
    <input type="submit" value="Submit" class="btn btn-primary">
  </form>
{% endblock %}
