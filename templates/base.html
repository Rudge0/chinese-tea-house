<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <link rel="apple-touch-icon" sizes="76x76" href="{{ ASSETS_ROOT }}/img/apple-icon.png">
  <link rel="icon" type="image/png" href="{{ ASSETS_ROOT }}/img/favicon.png">

  <title>
    Tea House "Jasmine Dragon"
  </title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css"
        integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
  <link rel="stylesheet" type="text/css"
        href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900|Roboto+Slab:400,700"/>
  <link href="{{ ASSETS_ROOT }}/css/nucleo-icons.css" rel="stylesheet"/>
  <link href="{{ ASSETS_ROOT }}/css/nucleo-svg.css" rel="stylesheet"/>
  <script src="https://kit.fontawesome.com/42d5adcbca.js" crossorigin="anonymous"></script>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
  <link id="pagestyle" href="{{ ASSETS_ROOT }}/css/style.css?v=3.0.0" rel="stylesheet"/>

</head>
<body>
{% block navigation %}
  {% include 'includes/navigation.html' %}
{% endblock %}
{% block basic-content %}
  <header class="header-3">
    <div class="page-header min-vh-100 relative" style="background-image: url('{{ ASSETS_ROOT }}/img/bg2.jpg')">
      <div class="container">
        <div class="card card-body blur shadow-blur mx-3 mx-md-4 mt-n6">
          <section class="pt-3 pb-4" id="count-stats">
            <div class="container">
              <div class="row">
                <div class="col-lg-9 mx-auto py-3">
                  <div class="row">
                    {% block content %}
                    {% endblock %}
                  </div>
                </div>
              </div>
            </div>
          </section>
        </div>
      </div>
    </div>
  </header>

{% endblock %}
{% block scripts %}
  {% include 'includes/scripts.html' %}
{% endblock %}
</body>
</html>
